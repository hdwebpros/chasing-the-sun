<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Chasing the Sun">
  <!-- Simple sun: disk + 8 rays. Transparent background. -->
  <g fill="#e0a93a">
    <!-- Rays (rounded caps, short enough to stay crisp at 16px) -->
    <g stroke="#e0a93a" stroke-width="2.2" stroke-linecap="round">
      <line x1="16" y1="2.5" x2="16" y2="6.2"/>
      <line x1="16" y1="25.8" x2="16" y2="29.5"/>
      <line x1="2.5" y1="16" x2="6.2" y2="16"/>
      <line x1="25.8" y1="16" x2="29.5" y2="16"/>
      <line x1="6.5" y1="6.5" x2="9.1" y2="9.1"/>
      <line x1="22.9" y1="22.9" x2="25.5" y2="25.5"/>
      <line x1="25.5" y1="6.5" x2="22.9" y2="9.1"/>
      <line x1="9.1" y1="22.9" x2="6.5" y2="25.5"/>
    </g>
    <!-- Disk -->
    <circle cx="16" cy="16" r="7"/>
  </g>
</svg>
